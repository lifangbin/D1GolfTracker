<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - D1 Golf Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #2E7D32; font-size: 24px; }
        .logo p { color: #666; margin-top: 8px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #333; font-weight: 500; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #2E7D32; }
        button {
            width: 100%;
            padding: 14px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #1B5E20; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .message {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .message.error { background: #ffebee; color: #c62828; }
        .message.success { background: #e8f5e9; color: #2E7D32; }
        .hidden { display: none; }
        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 11px;
            color: #666;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>D1 Golf Tracker</h1>
            <p>Reset your password</p>
        </div>

        <div id="message" class="message hidden"></div>

        <div id="verifyView">
            <p style="text-align: center; color: #666; margin-bottom: 20px;">Enter your email to verify and reset your password.</p>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            <button type="button" id="verifyBtn" onclick="handleVerify()">Verify & Continue</button>
        </div>

        <div id="resetView" class="hidden">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="Enter new password (min 8 characters)">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password">
            </div>
            <button type="button" id="resetBtn" onclick="handleReset()">Reset Password</button>
        </div>

        <div id="successView" class="hidden" style="text-align: center;">
            <p style="color: #2E7D32; font-size: 18px; margin-bottom: 20px;">Password reset successful!</p>
            <p style="color: #666;">You can now close this page and log in with your new password in the app.</p>
        </div>

        <div id="debugInfo" class="debug-info">
            <div id="debugContent">Loading...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        var debugEl = document.getElementById('debugContent');
        var logs = [];

        function log(msg) {
            console.log(msg);
            logs.push(msg);
            debugEl.innerText = logs.join('\n');
        }

        function showMessage(text, type) {
            var el = document.getElementById('message');
            el.innerText = text;
            el.className = 'message ' + type;
        }

        log('Script loaded');

        var SUPABASE_URL = 'https://znzcvssbsvzgmorizwga.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuemN2c3Nic3Z6Z21vcml6d2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzU3OTQsImV4cCI6MjA4Nzg1MTc5NH0.Jc9VOa37PT9D2GccsFR3T2V6GWy7nKLzXJb3rCjhwgQ';

        var supabaseClient = null;
        var otpToken = null;

        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            log('Supabase client created');
        } catch (e) {
            log('ERROR creating Supabase client: ' + e.message);
        }

        // Get token from URL
        log('URL: ' + window.location.href);

        if (window.location.hash) {
            var hashParams = new URLSearchParams(window.location.hash.substring(1));
            otpToken = hashParams.get('access_token');
            var email = hashParams.get('email');

            if (otpToken) {
                log('Found token: ' + otpToken);
            }
            if (email) {
                document.getElementById('email').value = decodeURIComponent(email);
                log('Found email: ' + email);
            }
        }

        if (!otpToken) {
            log('No token found in URL');
        }

        async function handleVerify() {
            log('Verify button clicked');

            var email = document.getElementById('email').value.trim();
            log('Email: ' + email);

            if (!email) {
                showMessage('Please enter your email', 'error');
                return;
            }

            if (!otpToken) {
                showMessage('No reset token found in URL', 'error');
                return;
            }

            var btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerText = 'Verifying...';

            log('Calling verifyOtp with token: ' + otpToken);

            try {
                var result = await supabaseClient.auth.verifyOtp({
                    email: email,
                    token: otpToken,
                    type: 'recovery'
                });

                log('verifyOtp result: ' + JSON.stringify(result));

                if (result.error) {
                    log('Error: ' + result.error.message);
                    showMessage(result.error.message, 'error');
                    btn.disabled = false;
                    btn.innerText = 'Verify & Continue';
                    return;
                }

                log('Verification successful!');
                document.getElementById('verifyView').classList.add('hidden');
                document.getElementById('resetView').classList.remove('hidden');

            } catch (e) {
                log('Exception: ' + e.message);
                showMessage('Error: ' + e.message, 'error');
                btn.disabled = false;
                btn.innerText = 'Verify & Continue';
            }
        }

        async function handleReset() {
            log('Reset button clicked');

            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirmPassword').value;

            if (password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            var btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.innerText = 'Resetting...';

            try {
                var result = await supabaseClient.auth.updateUser({ password: password });

                log('updateUser result: ' + JSON.stringify(result));

                if (result.error) {
                    log('Error: ' + result.error.message);
                    showMessage(result.error.message, 'error');
                    btn.disabled = false;
                    btn.innerText = 'Reset Password';
                    return;
                }

                log('Password updated successfully!');
                await supabaseClient.auth.signOut();
                document.getElementById('resetView').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');

            } catch (e) {
                log('Exception: ' + e.message);
                showMessage('Error: ' + e.message, 'error');
                btn.disabled = false;
                btn.innerText = 'Reset Password';
            }
        }

        log('Ready');
    </script>
</body>
</html>
