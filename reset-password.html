<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - D1 Golf Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #2E7D32;
            font-size: 24px;
        }
        .logo p {
            color: #666;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #2E7D32;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1B5E20;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
        }
        .message.success {
            background: #e8f5e9;
            color: #2E7D32;
        }
        .message.info {
            background: #e3f2fd;
            color: #1565c0;
        }
        .hidden {
            display: none;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 3px solid #e0e0e0;
            border-top: 3px solid #2E7D32;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .debug {
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>D1 Golf Tracker</h1>
            <p>Reset your password</p>
        </div>

        <div id="loadingView" class="loading">
            <div class="spinner"></div>
            <p>Verifying reset link...</p>
        </div>

        <div id="message" class="message hidden"></div>

        <form id="resetForm" class="hidden">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="Enter new password (min 8 characters)" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="8">
            </div>
            <button type="submit" id="submitBtn">Reset Password</button>
        </form>

        <div id="successView" class="hidden" style="text-align: center;">
            <p style="color: #2E7D32; font-size: 18px; margin-bottom: 20px;">Password reset successful!</p>
            <p style="color: #666;">You can now close this page and log in with your new password in the app.</p>
        </div>

        <div id="errorView" class="hidden" style="text-align: center;">
            <p style="color: #c62828; font-size: 18px; margin-bottom: 20px;">Unable to reset password</p>
            <p id="errorDetail" style="color: #666; margin-bottom: 20px;"></p>
            <p style="color: #666;">Please request a new password reset link from the app.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://znzcvssbsvzgmorizwga.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuemN2c3Nic3Z6Z21vcml6d2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzU3OTQsImV4cCI6MjA4Nzg1MTc5NH0.Jc9VOa37PT9D2GccsFR3T2V6GWy7nKLzXJb3rCjhwgQ';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loadingView = document.getElementById('loadingView');
        const form = document.getElementById('resetForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const successView = document.getElementById('successView');
        const errorView = document.getElementById('errorView');
        const errorDetail = document.getElementById('errorDetail');

        let isSessionValid = false;

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
            message.classList.remove('hidden');
        }

        function hideMessage() {
            message.classList.add('hidden');
        }

        function showError(detail) {
            loadingView.classList.add('hidden');
            form.classList.add('hidden');
            errorDetail.textContent = detail;
            errorView.classList.remove('hidden');
        }

        function showForm() {
            loadingView.classList.add('hidden');
            errorView.classList.add('hidden');
            form.classList.remove('hidden');
        }

        // Parse URL parameters (both hash and query params)
        function getUrlParams() {
            const params = {};

            // Check hash params (e.g., #access_token=xxx&type=recovery)
            if (window.location.hash) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                for (const [key, value] of hashParams) {
                    params[key] = value;
                }
            }

            // Check query params (e.g., ?code=xxx&type=recovery)
            const queryParams = new URLSearchParams(window.location.search);
            for (const [key, value] of queryParams) {
                params[key] = value;
            }

            return params;
        }

        async function init() {
            console.log('Initializing password reset page...');
            console.log('Full URL:', window.location.href);

            const params = getUrlParams();
            console.log('URL params:', params);

            // Method 1: Handle hash-based tokens (older Supabase flow)
            if (params.access_token && params.type === 'recovery') {
                console.log('Found access_token in URL, setting session...');
                try {
                    const { data, error } = await supabase.auth.setSession({
                        access_token: params.access_token,
                        refresh_token: params.refresh_token || ''
                    });

                    if (error) {
                        console.error('setSession error:', error);
                        showError(error.message);
                        return;
                    }

                    console.log('Session set successfully:', data);
                    isSessionValid = true;
                    showForm();
                    return;
                } catch (err) {
                    console.error('setSession exception:', err);
                    showError('Failed to verify reset link.');
                    return;
                }
            }

            // Method 2: Handle code-based flow (PKCE - newer Supabase flow)
            if (params.code) {
                console.log('Found code in URL, exchanging for session...');
                try {
                    const { data, error } = await supabase.auth.exchangeCodeForSession(params.code);

                    if (error) {
                        console.error('exchangeCodeForSession error:', error);
                        showError(error.message);
                        return;
                    }

                    console.log('Code exchanged successfully:', data);
                    isSessionValid = true;
                    showForm();
                    return;
                } catch (err) {
                    console.error('exchangeCodeForSession exception:', err);
                    showError('Failed to verify reset link.');
                    return;
                }
            }

            // Method 3: Check if there's already an active session (user clicked link and session was auto-restored)
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                console.log('Current session:', session);

                if (session && !error) {
                    console.log('Found existing session');
                    isSessionValid = true;
                    showForm();
                    return;
                }
            } catch (err) {
                console.error('getSession error:', err);
            }

            // Method 4: Listen for auth state changes (Supabase may handle the token automatically)
            console.log('Setting up auth state listener...');

            const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
                console.log('Auth state change:', event, session);

                if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
                    console.log('Password recovery event detected');
                    isSessionValid = true;
                    showForm();
                    subscription.unsubscribe();
                }
            });

            // Wait a bit for the auth state to settle
            setTimeout(() => {
                if (!isSessionValid) {
                    console.log('No valid session found after timeout');
                    showError('Invalid or expired reset link. The link may have already been used.');
                }
            }, 3000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            if (password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            try {
                console.log('Attempting to update password...');
                const { data, error } = await supabase.auth.updateUser({ password: password });

                console.log('updateUser response:', { data, error });

                if (error) {
                    console.error('updateUser error:', error);
                    showMessage(error.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                } else {
                    console.log('Password updated successfully');
                    // Sign out after password reset to ensure clean state
                    await supabase.auth.signOut();
                    form.classList.add('hidden');
                    successView.classList.remove('hidden');
                }
            } catch (err) {
                console.error('updateUser exception:', err);
                showMessage('An error occurred: ' + err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });

        // Start initialization
        init();
    </script>
</body>
</html>
