<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - D1 Golf Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #2E7D32;
            font-size: 24px;
        }
        .logo p {
            color: #666;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #2E7D32;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1B5E20;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
        }
        .message.success {
            background: #e8f5e9;
            color: #2E7D32;
        }
        .message.info {
            background: #e3f2fd;
            color: #1565c0;
        }
        .hidden {
            display: none;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 3px solid #e0e0e0;
            border-top: 3px solid #2E7D32;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 11px;
            color: #666;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
        .debug-info pre {
            white-space: pre-wrap;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>D1 Golf Tracker</h1>
            <p>Reset your password</p>
        </div>

        <div id="loadingView" class="loading">
            <div class="spinner"></div>
            <p>Verifying reset link...</p>
        </div>

        <div id="message" class="message hidden"></div>

        <form id="resetForm" class="hidden">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="Enter new password (min 8 characters)" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="8">
            </div>
            <button type="submit" id="submitBtn">Reset Password</button>
        </form>

        <div id="successView" class="hidden" style="text-align: center;">
            <p style="color: #2E7D32; font-size: 18px; margin-bottom: 20px;">Password reset successful!</p>
            <p style="color: #666;">You can now close this page and log in with your new password in the app.</p>
        </div>

        <div id="errorView" class="hidden" style="text-align: center;">
            <p style="color: #c62828; font-size: 18px; margin-bottom: 20px;">Unable to reset password</p>
            <p id="errorDetail" style="color: #666; margin-bottom: 20px;"></p>
            <p style="color: #666;">Please request a new password reset link from the app.</p>
        </div>

        <div id="debugInfo" class="debug-info hidden">
            <pre id="debugContent"></pre>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://znzcvssbsvzgmorizwga.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuemN2c3Nic3Z6Z21vcml6d2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzU3OTQsImV4cCI6MjA4Nzg1MTc5NH0.Jc9VOa37PT9D2GccsFR3T2V6GWy7nKLzXJb3rCjhwgQ';

        // Create client with specific options for password recovery
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true
            }
        });

        const loadingView = document.getElementById('loadingView');
        const form = document.getElementById('resetForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const successView = document.getElementById('successView');
        const errorView = document.getElementById('errorView');
        const errorDetail = document.getElementById('errorDetail');
        const debugInfo = document.getElementById('debugInfo');
        const debugContent = document.getElementById('debugContent');

        let isSessionValid = false;
        let debugLog = [];

        function log(msg) {
            console.log(msg);
            debugLog.push(new Date().toLocaleTimeString() + ': ' + msg);
            debugContent.textContent = debugLog.join('\n');
        }

        function showDebug() {
            debugInfo.classList.remove('hidden');
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
            message.classList.remove('hidden');
        }

        function hideMessage() {
            message.classList.add('hidden');
        }

        function showError(detail) {
            loadingView.classList.add('hidden');
            form.classList.add('hidden');
            errorDetail.textContent = detail;
            errorView.classList.remove('hidden');
            showDebug();
        }

        function showForm() {
            loadingView.classList.add('hidden');
            errorView.classList.add('hidden');
            form.classList.remove('hidden');
        }

        async function init() {
            log('Page loaded');
            log('URL: ' + window.location.href);
            log('Hash: ' + window.location.hash);
            log('Search: ' + window.location.search);

            // First, let Supabase auto-detect and handle the session from URL
            // The detectSessionInUrl option should handle this automatically

            // Wait a moment for Supabase to process the URL
            await new Promise(resolve => setTimeout(resolve, 500));

            // Check for session
            const { data: { session }, error: sessionError } = await supabase.auth.getSession();

            log('Session check - session: ' + (session ? 'exists' : 'null'));
            if (sessionError) {
                log('Session error: ' + sessionError.message);
            }

            if (session) {
                log('Valid session found for: ' + session.user.email);
                isSessionValid = true;
                showForm();
                return;
            }

            // Try to handle hash params manually if auto-detect didn't work
            if (window.location.hash) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');
                const type = hashParams.get('type');
                const errorCode = hashParams.get('error_code');
                const errorDesc = hashParams.get('error_description');

                log('Hash params - type: ' + type + ', has_token: ' + !!accessToken);

                if (errorCode) {
                    log('Error in URL: ' + errorCode + ' - ' + errorDesc);
                    showError(errorDesc || 'An error occurred with the reset link.');
                    return;
                }

                if (accessToken && type === 'recovery') {
                    log('Attempting to set session with access token...');
                    try {
                        const { data, error } = await supabase.auth.setSession({
                            access_token: accessToken,
                            refresh_token: refreshToken || ''
                        });

                        if (error) {
                            log('setSession error: ' + error.message);
                            showError(error.message);
                            return;
                        }

                        log('Session set successfully');
                        isSessionValid = true;
                        showForm();
                        return;
                    } catch (err) {
                        log('setSession exception: ' + err.message);
                    }
                }
            }

            // Try query params (for PKCE flow)
            const queryParams = new URLSearchParams(window.location.search);
            const code = queryParams.get('code');

            if (code) {
                log('Found code param, exchanging for session...');
                try {
                    const { data, error } = await supabase.auth.exchangeCodeForSession(code);

                    if (error) {
                        log('Code exchange error: ' + error.message);
                        showError(error.message);
                        return;
                    }

                    log('Code exchanged successfully');
                    isSessionValid = true;
                    showForm();
                    return;
                } catch (err) {
                    log('Code exchange exception: ' + err.message);
                }
            }

            // Listen for auth state changes as fallback
            log('Setting up auth listener...');

            supabase.auth.onAuthStateChange((event, session) => {
                log('Auth event: ' + event);

                if (event === 'PASSWORD_RECOVERY') {
                    log('PASSWORD_RECOVERY event received');
                    isSessionValid = true;
                    showForm();
                } else if (event === 'SIGNED_IN' && session) {
                    log('SIGNED_IN event with session');
                    isSessionValid = true;
                    showForm();
                }
            });

            // Wait for potential auth state change
            setTimeout(() => {
                if (!isSessionValid) {
                    log('No valid session after timeout');
                    showError('Invalid or expired reset link. Please request a new one from the app.');
                }
            }, 3000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            if (password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            log('Submitting new password...');

            try {
                const { data, error } = await supabase.auth.updateUser({ password: password });

                if (error) {
                    log('updateUser error: ' + error.message);
                    showMessage(error.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                    showDebug();
                } else {
                    log('Password updated successfully!');
                    await supabase.auth.signOut();
                    form.classList.add('hidden');
                    successView.classList.remove('hidden');
                }
            } catch (err) {
                log('updateUser exception: ' + err.message);
                showMessage('An error occurred: ' + err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
                showDebug();
            }
        });

        // Start
        init();
    </script>
</body>
</html>
