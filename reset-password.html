<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - D1 Golf Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #2E7D32;
            font-size: 24px;
        }
        .logo p {
            color: #666;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #2E7D32;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1B5E20;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
        }
        .message.success {
            background: #e8f5e9;
            color: #2E7D32;
        }
        .message.info {
            background: #e3f2fd;
            color: #1565c0;
        }
        .hidden {
            display: none;
        }
        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 11px;
            color: #666;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
        .debug-info pre {
            white-space: pre-wrap;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>D1 Golf Tracker</h1>
            <p>Reset your password</p>
        </div>

        <div id="message" class="message hidden"></div>

        <!-- Step 1: Email verification (shown when token in URL) -->
        <div id="verifyView">
            <p style="text-align: center; color: #666; margin-bottom: 20px;">Enter your email to verify and reset your password.</p>
            <form id="verifyForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <button type="submit" id="verifyBtn">Verify & Continue</button>
            </form>
        </div>

        <!-- Step 2: New password form (shown after verification) -->
        <form id="resetForm" class="hidden">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="Enter new password (min 8 characters)" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="8">
            </div>
            <button type="submit" id="submitBtn">Reset Password</button>
        </form>

        <div id="successView" class="hidden" style="text-align: center;">
            <p style="color: #2E7D32; font-size: 18px; margin-bottom: 20px;">Password reset successful!</p>
            <p style="color: #666;">You can now close this page and log in with your new password in the app.</p>
        </div>

        <div id="errorView" class="hidden" style="text-align: center;">
            <p style="color: #c62828; font-size: 18px; margin-bottom: 20px;">Unable to reset password</p>
            <p id="errorDetail" style="color: #666; margin-bottom: 20px;"></p>
            <p style="color: #666;">Please request a new password reset link from the app.</p>
        </div>

        <div id="debugInfo" class="debug-info">
            <pre id="debugContent"></pre>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://znzcvssbsvzgmorizwga.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuemN2c3Nic3Z6Z21vcml6d2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzU3OTQsImV4cCI6MjA4Nzg1MTc5NH0.Jc9VOa37PT9D2GccsFR3T2V6GWy7nKLzXJb3rCjhwgQ';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const verifyView = document.getElementById('verifyView');
        const verifyForm = document.getElementById('verifyForm');
        const verifyBtn = document.getElementById('verifyBtn');
        const resetForm = document.getElementById('resetForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const successView = document.getElementById('successView');
        const errorView = document.getElementById('errorView');
        const errorDetail = document.getElementById('errorDetail');
        const debugInfo = document.getElementById('debugInfo');
        const debugContent = document.getElementById('debugContent');

        let debugLog = [];
        let otpToken = null;

        function log(msg) {
            console.log(msg);
            debugLog.push(new Date().toLocaleTimeString() + ': ' + msg);
            debugContent.textContent = debugLog.join('\n');
        }

        function showDebug() {
            debugInfo.classList.remove('hidden');
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
            message.classList.remove('hidden');
        }

        function hideMessage() {
            message.classList.add('hidden');
        }

        function showError(detail) {
            verifyView.classList.add('hidden');
            resetForm.classList.add('hidden');
            errorDetail.textContent = detail;
            errorView.classList.remove('hidden');
            showDebug();
        }

        // Get token and email from URL
        function getParamsFromUrl() {
            let token = null;
            let email = null;
            let tokenType = null;

            // Check hash params
            if (window.location.hash) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                token = hashParams.get('access_token');
                email = hashParams.get('email');
                if (token) tokenType = 'access_token';
            }

            // Check query params
            const queryParams = new URLSearchParams(window.location.search);
            if (!token) {
                const code = queryParams.get('code');
                if (code) {
                    token = code;
                    tokenType = 'code';
                }
            }
            if (!email) {
                email = queryParams.get('email');
            }

            return { token, email, tokenType };
        }

        async function init() {
            log('Page loaded');
            log('URL: ' + window.location.href);

            const params = getParamsFromUrl();

            if (params.token) {
                otpToken = params.token;
                log('Found token: ' + params.tokenType + ' = ' + otpToken.substring(0, 20) + '...');

                // Pre-fill email if provided
                if (params.email) {
                    document.getElementById('email').value = decodeURIComponent(params.email);
                    log('Email from URL: ' + params.email);
                }
            } else {
                log('No token found in URL');
                showError('No reset token found. Please click the link from your email.');
            }
        }

        // Step 1: Verify email with OTP token
        verifyForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            log('Form submitted');
            hideMessage();

            const email = document.getElementById('email').value.trim();
            log('Email entered: ' + email);

            if (!email) {
                showMessage('Please enter your email', 'error');
                return;
            }

            if (!otpToken) {
                showMessage('No reset token found', 'error');
                log('ERROR: otpToken is null');
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';
            log('Verifying OTP for: ' + email + ' with token: ' + otpToken);

            try {
                log('Calling supabase.auth.verifyOtp...');
                // Use verifyOtp with token_hash for recovery
                const { data, error } = await supabase.auth.verifyOtp({
                    email: email,
                    token: otpToken,
                    type: 'recovery'
                });

                log('verifyOtp returned');

                if (error) {
                    log('verifyOtp error: ' + error.message);
                    showMessage(error.message, 'error');
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = 'Verify & Continue';
                    return;
                }

                log('OTP verified successfully');
                log('Session user: ' + (data.session?.user?.email || 'none'));

                // Show password reset form
                verifyView.classList.add('hidden');
                resetForm.classList.remove('hidden');

            } catch (err) {
                log('verifyOtp exception: ' + (err.message || err));
                showMessage('Verification failed: ' + (err.message || err), 'error');
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'Verify & Continue';
            }
        });

        // Step 2: Reset password
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            if (password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            log('Updating password...');

            try {
                const { data, error } = await supabase.auth.updateUser({ password: password });

                if (error) {
                    log('updateUser error: ' + error.message);
                    showMessage(error.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                    showDebug();
                } else {
                    log('Password updated successfully!');
                    await supabase.auth.signOut();
                    resetForm.classList.add('hidden');
                    successView.classList.remove('hidden');
                }
            } catch (err) {
                log('updateUser exception: ' + err.message);
                showMessage('An error occurred: ' + err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
                showDebug();
            }
        });

        // Start
        init();
    </script>
</body>
</html>
